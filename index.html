<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Web AR Exploded View</title>

  <!-- model-viewer: 最简单的 3D/AR Web 组件 -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root { --pad: 12px; --radius: 14px; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .wrap { height: 100vh; display: flex; flex-direction: column; background: #fff; }

    /* ✅ 3D 预览背景改成灰色 */
    model-viewer {
      width: 100%;
      flex: 1;
      background: #cfcfcf;
    }

    .panel {
      padding: var(--pad);
      border-top: 1px solid #e6e6e6;
      background: #ffffff;
      position: relative;
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      padding: 10px 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:active { transform: scale(0.99); }

    /* ✅ 截图开关按钮的状态样式 */
    .toggle-on {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .toggle-off {
      background: #fff;
      color: #111;
      border-color: #ddd;
    }
    .toggle-label {
      font-size: 12px;
      color: #555;
      margin-left: 4px;
      user-select: none;
    }

    /* ===== Chat UI ===== */
    .chat-fab {
      position: absolute;
      right: var(--pad);
      top: var(--pad);
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: min(380px, calc(100vw - 24px));
      height: min(540px, calc(100vh - 24px));
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9999;
    }
    .chat.open { display: flex; }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #111;
      color: #fff;
      font-size: 14px;
    }
    .chat-header button {
      background: transparent;
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-body {
      flex: 1;
      padding: 10px 12px;
      overflow: auto;
      background: #fafafa;
    }

    .msg { margin: 10px 0; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.ai { justify-content: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble { background: #111; color: #fff; border-bottom-right-radius: 6px; }
    .ai .bubble { background: #fff; color: #111; border: 1px solid #e6e6e6; border-bottom-left-radius: 6px; }

    .img-preview {
      margin-top: 8px;
      width: 180px;
      border-radius: 10px;
      border: 1px solid #e6e6e6;
      display: block;
      background: #fff;
    }

    .chat-footer {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #e6e6e6;
      background: #fff;
      align-items: center;
    }
    .chat-footer input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }
    .send-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .small {
      font-size: 12px;
      color: #666;
      padding: 0 12px 10px 12px;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <model-viewer id="mv"
      src="assembled.glb"
      ios-src="assembled.usdz"
      camera-controls
      ar
      ar-modes="quick-look webxr scene-viewer"
      shadow-intensity="1"
      exposure="1.0"
      alt="Product model">
    </model-viewer>

    <div class="panel">
      <div class="btns">
        <button onclick="setModel('assembled.glb', 'assembled.usdz')">assembled</button>
        <button onclick="setModel('gear_exploded.glb', 'gear_exploded.usdz')">gear</button>
        <button onclick="setModel('motor_exploded.glb', 'motor_exploded.usdz')">motor</button>
        <!-- ✅ 修正：all_exploded.usdz 少了一个点 -->
        <button onclick="setModel('all_exploded.glb', 'all_exploded.usdz')">all exploded</button>

        <!-- ✅ 新增：控制是否发送截图 -->
        <button id="imgToggleBtn" class="toggle-on" onclick="toggleSendImage()">Send image: ON</button>
        <span class="toggle-label" id="imgToggleLabel">(snapshot will be included)</span>
      </div>

      <button class="chat-fab" onclick="toggleChat()">Chat</button>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat" id="chatPanel">
    <div class="chat-header">
      <div>AI Assistant</div>
      <div>
        <button onclick="clearChat()">Clear</button>
        <button onclick="toggleChat()">Close</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-footer">
      <input id="chatInput" placeholder="Type your question..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="small">
      发送时会自动截取当前 3D 预览截图，并把“问题 + 截图”打包为 payload（已为后端接入准备）。
    </div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const chatPanel = document.getElementById("chatPanel");
    const chatBody = document.getElementById("chatBody");
    const chatInput = document.getElementById("chatInput");

    // ✅ 新增：是否把截图包含进 payload（默认 ON）
    let sendImageEnabled = true;
    const imgToggleBtn = document.getElementById("imgToggleBtn");
    const imgToggleLabel = document.getElementById("imgToggleLabel");

    function toggleSendImage() {
      sendImageEnabled = !sendImageEnabled;

      if (sendImageEnabled) {
        imgToggleBtn.textContent = "Send image: ON";
        imgToggleBtn.classList.remove("toggle-off");
        imgToggleBtn.classList.add("toggle-on");
        imgToggleLabel.textContent = "(snapshot will be included)";
      } else {
        imgToggleBtn.textContent = "Send image: OFF";
        imgToggleBtn.classList.remove("toggle-on");
        imgToggleBtn.classList.add("toggle-off");
        imgToggleLabel.textContent = "(text-only)";
      }
    }

    // ===== ✅✅ 新增：对话记忆（前端保存 + 刷新保留）=====
    const HISTORY_KEY = "xr_chat_history_v1";
    const HISTORY_MAX = 12; // 只发最近 12 条（约 6 轮），速度更快

    let chatHistory = []; 
    // chatHistory 元素格式：{ role: "user" | "assistant", content: "..." }

    function saveHistory() {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(chatHistory));
      } catch (e) {}
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) chatHistory = parsed;
      } catch (e) {
        chatHistory = [];
      }
    }

    function renderHistory() {
      // 只渲染文本历史（历史截图不存，节省空间/成本）
      for (const m of chatHistory) {
        if (m.role === "user") appendMessage("user", m.content, null);
        else appendMessage("ai", m.content, null);
      }
    }
    // ===== ✅✅ 新增结束 =====

    // ===== 1) 切换模型：不做任何复制 =====
    function setModel(glbFile, usdzFile) {
      mv.src = glbFile;
      mv.setAttribute("ios-src", usdzFile);
    }

    // ===== 2) Chat UI =====
    function toggleChat() {
      chatPanel.classList.toggle("open");
      if (chatPanel.classList.contains("open")) {
        setTimeout(() => chatInput.focus(), 50);
      }
    }

    // ✅ 修改：Clear 同时清空 UI + 本地记忆（刷新也从新对话开始）
    function clearChat() {
      chatBody.innerHTML = "";
      chatHistory = [];
      try { localStorage.removeItem(HISTORY_KEY); } catch (e) {}
    }

    // ✅ 轻微增强：appendMessage 返回 bubble DOM，便于更新“Thinking...”那条（不影响其他使用）
    function appendMessage(role, text, imgDataUrl = null) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      if (imgDataUrl) {
        const img = document.createElement("img");
        img.className = "img-preview";
        img.src = imgDataUrl;
        img.alt = "snapshot";
        bubble.appendChild(document.createElement("br"));
        bubble.appendChild(img);
      }

      row.appendChild(bubble);
      chatBody.appendChild(row);
      chatBody.scrollTop = chatBody.scrollHeight;
      return bubble;
    }

    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // ===== 3) 发送时：根据开关决定是否截图 + 组装 payload（为后端准备）=====
    async function sendMessage() {
      const q = chatInput.value.trim();
      if (!q) return;
      chatInput.value = "";

      // ✅ 只有开关为 ON 才截图
      const snapshotDataUrl = sendImageEnabled ? await captureSnapshot() : null;

      // 在聊天里显示用户消息（如果ON则带预览图）
      appendMessage("user", q, snapshotDataUrl);

      // ✅✅ 新增：写入历史 + 保存
      chatHistory.push({ role: "user", content: q });
      saveHistory();

      // ✅ 为后端接入准备的 payload（截图开关 OFF 时 snapshot_data_url 为 null）
      // ✅✅ 新增：把最近 N 条历史一起发给后端，让模型有上下文
      const payload = {
        question: q,
        snapshot_data_url: snapshotDataUrl, // data:image/jpeg;base64,... 或 null
        model_src: mv.getAttribute("src"),
        ts: Date.now(),
        history: chatHistory.slice(-HISTORY_MAX)
      };

      console.log("READY_FOR_BACKEND_PAYLOAD:", payload);

      // =========================
      // ✅✅ 这里开始：接入 AI（只修改这一段）
      // =========================
      const thinkingBubble = appendMessage("ai", "Thinking...");

      try {
        const r = await fetch("https://webxr-gpt-connect.sz20040906.workers.dev/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await r.json();

        if (data && data.answer) {
          // 用返回结果覆盖“Thinking...”那条（避免多一条）
          thinkingBubble.textContent = data.answer;

          // ✅✅ 新增：写入历史 + 保存
          chatHistory.push({ role: "assistant", content: data.answer });
          saveHistory();
        } else {
          thinkingBubble.textContent = "Error: " + (data?.error || "No answer returned.");
        }
      } catch (err) {
        thinkingBubble.textContent = "Network error: " + err;
      }
      // =========================
      // ✅✅ 这里结束：接入 AI
      // =========================
    }

    // ===== 4) 截图：优先用 model-viewer.toDataURL()，否则尝试内部 canvas =====
    async function captureSnapshot() {
      try {
        if (typeof mv.toDataURL === "function") {
          const pngDataUrl = await mv.toDataURL();
          return await convertDataUrlToJpeg(pngDataUrl, 0.75);
        }

        const canvas = mv.shadowRoot?.querySelector("canvas");
        if (canvas && canvas.toDataURL) {
          const pngDataUrl = canvas.toDataURL("image/png");
          return await convertDataUrlToJpeg(pngDataUrl, 0.75);
        }

        return null;
      } catch (e) {
        return null;
      }
    }

    // PNG -> JPEG（减小体积，未来传后端更省）
    function convertDataUrlToJpeg(dataUrl, quality = 0.8) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = img.width;
          c.height = img.height;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    // ✅✅ 新增：页面加载时恢复历史并渲染（刷新后继续对话）
    loadHistory();
    renderHistory();
  </script>
</body>
</html>
