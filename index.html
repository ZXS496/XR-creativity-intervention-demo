<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Web AR Exploded View + Screenshot Chat</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root { --pad: 12px; --radius: 14px; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .wrap { height: 100vh; display: flex; flex-direction: column; background: #fff; }

    model-viewer { width: 100%; flex: 1; background: #f4f4f4; }

    /* (可选) 放大 AR 按钮 */
    model-viewer::part(default-ar-button),
    model-viewer::part(ar-button) {
      width: 84px; height: 84px;
      border-radius: 999px;
      font-size: 16px;
      border: 2px solid #111;
    }

    .panel {
      padding: var(--pad);
      border-top: 1px solid #e6e6e6;
      background: #fff;
      position: relative;
    }

    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 10px 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:active { transform: scale(0.99); }

    .hint { margin-top: 8px; font-size: 12px; color: #666; }

    /* Chat floating button */
    .chat-fab {
      position: absolute;
      right: var(--pad);
      top: var(--pad);
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    /* Chat panel */
    .chat {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: min(380px, calc(100vw - 24px));
      height: min(540px, calc(100vh - 24px));
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9999;
    }
    .chat.open { display: flex; }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #111;
      color: #fff;
      font-size: 14px;
    }
    .chat-header button {
      background: transparent;
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-body {
      flex: 1;
      padding: 10px 12px;
      overflow: auto;
      background: #fafafa;
    }

    .msg { margin: 10px 0; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.ai { justify-content: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble { background: #111; color: #fff; border-bottom-right-radius: 6px; }
    .ai .bubble { background: #fff; color: #111; border: 1px solid #e6e6e6; border-bottom-left-radius: 6px; }

    .img-preview {
      margin-top: 6px;
      width: 180px;
      border-radius: 10px;
      border: 1px solid #e6e6e6;
      display: block;
    }

    .chat-footer {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #e6e6e6;
      background: #fff;
      align-items: center;
    }
    .chat-footer input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }
    .send-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .small { font-size: 12px; color: #666; }
  </style>
</head>

<body>
  <div class="wrap">
    <model-viewer id="mv"
      src="assembled.glb"
      ios-src="assembled.usdz"
      camera-controls
      ar
      ar-modes="quick-look webxr scene-viewer"
      shadow-intensity="1"
      alt="Product model">
    </model-viewer>

    <div class="panel">
      <div class="btns">
        <button onclick="setModel('assembled.glb','assembled.usdz')">Planet Gearbox</button>
        <button onclick="setModel('gear_exploded.glb','gear_exploded.usdz')">Gear</button>
        <button onclick="setModel('motor_exploded.glb','motor_exploded.usdz')">Motor</button>
        <button onclick="setModel('all_exploded.glb','all_exploded.usdz')">All Explode</button>
      </div>

      <div class="hint">
        When you click <b>Send</b>, the page will automatically take a snapshot of the current 3D view and send it to AI (later via API).
      </div>

      <button class="chat-fab" onclick="toggleChat()">Chat</button>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat" id="chatPanel">
    <div class="chat-header">
      <div>AI Assistant</div>
      <div>
        <button onclick="clearChat()">Clear</button>
        <button onclick="toggleChat()">Close</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-footer">
      <input id="chatInput" placeholder="Type your question..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="small" style="padding: 0 12px 10px 12px;">
      Note: iOS Quick Look AR view cannot be captured by the webpage. Ask while viewing the 3D preview.
    </div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const chatPanel = document.getElementById("chatPanel");
    const chatBody = document.getElementById("chatBody");
    const chatInput = document.getElementById("chatInput");

    function setModel(glbFile, usdzFile) {
      mv.src = glbFile;
      mv.setAttribute("ios-src", usdzFile);
    }

    // Chat UI
    function toggleChat() {
      chatPanel.classList.toggle("open");
      if (chatPanel.classList.contains("open")) {
        setTimeout(() => chatInput.focus(), 50);
      }
    }
    function clearChat() { chatBody.innerHTML = ""; }

    function appendMessage(role, text, imgDataUrl=null) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      if (imgDataUrl) {
        const img = document.createElement("img");
        img.className = "img-preview";
        img.src = imgDataUrl;
        img.alt = "snapshot";
        bubble.appendChild(document.createElement("br"));
        bubble.appendChild(img);
      }

      row.appendChild(bubble);
      chatBody.appendChild(row);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
      const q = chatInput.value.trim();
      if (!q) return;
      chatInput.value = "";

      // 1) capture snapshot automatically
      const snapshot = await captureSnapshot(); // data:image/jpeg;base64,... or null

      // 2) show user message + image preview
      appendMessage("user", q, snapshot);

      // 3) payload you will send to your backend later
      const payload = {
        question: q,
        snapshot_data_url: snapshot,     // this is the important part
        model_src: mv.getAttribute("src") // optional: helps you debug which model file was loaded
      };
      console.log("Payload to send to AI later:", payload);

      // 4) demo AI reply for now
      const reply = await fakeAIReply(payload);
      appendMessage("ai", reply);
    }

    // Snapshot capture (works for the 3D preview canvas)
    async function captureSnapshot() {
      try {
        // Preferred: model-viewer has toDataURL() in many versions
        if (typeof mv.toDataURL === "function") {
          const pngDataUrl = await mv.toDataURL();
          return await convertDataUrlToJpeg(pngDataUrl, 0.75);
        }

        // Fallback: try to find internal canvas
        const canvas = mv.shadowRoot?.querySelector("canvas");
        if (canvas && canvas.toDataURL) {
          const pngDataUrl = canvas.toDataURL("image/png");
          return await convertDataUrlToJpeg(pngDataUrl, 0.75);
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    // Convert PNG to smaller JPEG to reduce bandwidth/cost
    function convertDataUrlToJpeg(dataUrl, quality = 0.8) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = img.width;
          c.height = img.height;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    function fakeAIReply(payload) {
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve(`(demo) I received your question and a snapshot. model_src=${payload.model_src}.`);
        }, 450);
      });
    }
  </script>
</body>
</html>
