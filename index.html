<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Web AR Exploded View + Chat</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    :root { --pad: 12px; --radius: 14px; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .wrap { height: 100vh; display: flex; flex-direction: column; background: #fff; }

    model-viewer { width: 100%; flex: 1; background: #f4f4f4; }

    /* Make the AR button bigger */
    model-viewer::part(default-ar-button),
    model-viewer::part(ar-button) {
      width: 84px;
      height: 84px;
      border-radius: 999px;
      font-size: 16px;
      border: 2px solid #111;
    }

    .panel {
      padding: var(--pad);
      border-top: 1px solid #e6e6e6;
      background: #fff;
      position: relative;
    }

    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 10px 12px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    button:active { transform: scale(0.99); }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #333;
      line-height: 1.4;
    }
    .status code {
      background: #f6f6f6;
      padding: 2px 6px;
      border-radius: 6px;
      white-space: pre-wrap;
    }

    /* Chat widget: bottom-right floating panel */
    .chat-fab {
      position: absolute;
      right: var(--pad);
      top: var(--pad);
      background: #111;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .chat {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: min(380px, calc(100vw - 24px));
      height: min(520px, calc(100vh - 24px));
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9999;
    }

    .chat.open { display: flex; }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #111;
      color: #fff;
      font-size: 14px;
    }

    .chat-header button {
      background: transparent;
      border: none;
      color: #fff;
      padding: 6px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .chat-body {
      flex: 1;
      padding: 10px 12px;
      overflow: auto;
      background: #fafafa;
    }

    .msg { margin: 10px 0; display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.ai { justify-content: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble { background: #111; color: #fff; border-bottom-right-radius: 6px; }
    .ai .bubble { background: #fff; color: #111; border: 1px solid #e6e6e6; border-bottom-left-radius: 6px; }

    .chat-footer {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #e6e6e6;
      background: #fff;
    }

    .chat-footer input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }

    .send-btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <model-viewer id="mv"
      src="assembled.glb"
      ios-src="assembled.usdz"
      camera-controls
      ar
      ar-modes="quick-look webxr scene-viewer"
      shadow-intensity="1"
      alt="Product model">
    </model-viewer>

    <div class="panel">
      <!-- Buttons -->
      <div class="btns">
        <button onclick="setStateAndAutoCopy('Assembled', 'assembled.glb', 'assembled.usdz')">not explode</button>
        <button onclick="setStateAndAutoCopy('Explode A', 'explode_A.glb', 'explode_A.usdz')">Part A</button>
        <button onclick="setStateAndAutoCopy('Explode B', 'explode_B.glb', 'explode_B.usdz')">Part B</button>
        <button onclick="setStateAndAutoCopy('Explode ALL', 'explode_all.glb', 'explode_all.usdz')">All explode</button>
      </div>

      <div class="status">
        Current state: <b id="stateName">Assembled</b><br/>
        Copied state text: <code id="stateText"></code>
        <div class="hint">Switching buttons auto-copies the state.</div>
      </div>

      <button class="chat-fab" onclick="toggleChat()">Chat</button>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat" id="chatPanel">
    <div class="chat-header">
      <div>AI Assistant</div>
      <div>
        <button onclick="clearChat()">Clear</button>
        <button onclick="toggleChat()">Close</button>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-footer">
      <input id="chatInput" placeholder="Type your question..." />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const mv = document.getElementById("mv");
    const stateNameEl = document.getElementById("stateName");
    const stateTextEl = document.getElementById("stateText");

    const chatPanel = document.getElementById("chatPanel");
    const chatBody = document.getElementById("chatBody");
    const chatInput = document.getElementById("chatInput");

    // Minimal state
    const state = { view: "Assembled", glb: "assembled.glb", usdz: "assembled.usdz", ts: Date.now() };

    // ====== 1) Exploded-view state + auto-copy ======
    updateStateText();

    async function setStateAndAutoCopy(viewName, glbFile, usdzFile) {
      mv.src = glbFile;
      mv.setAttribute("ios-src", usdzFile);

      state.view = viewName;
      state.glb = glbFile;
      state.usdz = usdzFile;
      state.ts = Date.now();

      stateNameEl.textContent = viewName;
      updateStateText();

      // Auto copy on button click
      await copyState(true);
    }

    function updateStateText() {
      // If you only want "explode A/B/all/assembled", keep it short:
      let shortText = "assembled";
      if (state.view === "Explode A") shortText = "explode A";
      else if (state.view === "Explode B") shortText = "explode B";
      else if (state.view === "Explode ALL") shortText = "explode all";
      else shortText = "assembled";

      stateTextEl.textContent = shortText;
    }

    async function copyState(silent) {
      const text = stateTextEl.textContent;
      try {
        await navigator.clipboard.writeText(text);
        // silent: no alert
        if (!silent) alert("Copied!");
      } catch (e) {
        // fallback
        prompt("Copy this text:", text);
      }
    }

    // ====== 2) Chat UI (no API yet) ======
    function toggleChat() {
      chatPanel.classList.toggle("open");
      if (chatPanel.classList.contains("open")) {
        // focus input
        setTimeout(() => chatInput.focus(), 50);
      }
    }

    function clearChat() {
      chatBody.innerHTML = "";
    }

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatBody.appendChild(row);
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    // Press Enter to send
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    async function sendMessage() {
      const q = chatInput.value.trim();
      if (!q) return;

      // Auto include current state as context (simple + transparent)
      const context = `(${stateTextEl.textContent})`;
      appendMessage("user", `${context} ${q}`);
      chatInput.value = "";

      // Fake AI reply for now (later replace with real API call)
      const reply = await fakeAIReply(q, stateTextEl.textContent);
      appendMessage("ai", reply);
    }

    function fakeAIReply(question, shortState) {
      // This is just to prove the UI works.
      // Later, you'll replace this with a fetch() to your backend GPT endpoint.
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve(`(demo) I know your current state is "${shortState}". You asked: "${question}".`);
        }, 400);
      });
    }
  </script>
</body>
</html>
